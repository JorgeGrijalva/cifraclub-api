version: '3.9'

services:
  app:
    build: .
    restart: on-failure
    volumes: 
      - ./app:/app
    ports: 
      - "${PORT:-3000}:3000"
    environment: 
      PYTHONPATH: /app
      SELENIUM_URL: http://selenium:4444/wd/hub
      PORT: ${PORT:-3000}
    depends_on:
      - "selenium"

  selenium:
    image: selenium/standalone-firefox
    ports:
    - 4444:4444
